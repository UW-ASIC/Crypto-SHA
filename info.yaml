# Tiny Tapeout project information
project:
  title:        "SHA-256 Hardware Accelerator"
  author:       "UW-ASIC"
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A hardware SHA-256 hash engine for fixed 256-bit (32-byte) messages, with a byte-serial bus interface."
  language:     "Verilog"
  clock_hz:     50000000  # 50 MHz (20ns period as set in config.json)
  tiles: "2x4"
  top_module:  "tt_um_example"
  source_files:
    - "SHA.v"
    - "padder.v"
    - "message_schedule.v"
    - "round_constants.v"
    - "round.v"
    - "project.v"
# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"
  # Outputs
  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"
  # Bidirectional pins
  uio[0]: "opcode[0]"
  uio[1]: "opcode[1]"
  uio[2]: "source_id[0]"
  uio[3]: "source_id[1]"
  uio[4]: "dest_id[0]"
  uio[5]: "dest_id[1]"
  uio[6]: "valid_in / data_valid"
  uio[7]: "ready_in / data_ready"
# Do not change!
yaml_version: 6
